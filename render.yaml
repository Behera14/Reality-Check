services:
  - type: web
    name: deepfake-detection-app
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: 10000
      - key: MEDIAPIPE_DISABLE_GPU
        value: "1"
      - key: KMP_DUPLICATE_LIB_OK
        value: "True"
    healthCheckPath: /
    autoDeploy: true

