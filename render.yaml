services:
  - type: web
    name: deepfake-detection-app
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: 10000
      - key: MEDIAPIPE_DISABLE_GPU
        value: "1"
      - key: KMP_DUPLICATE_LIB_OK
        value: "True"
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "3"
      - key: CUDA_VISIBLE_DEVICES
        value: ""
      - key: TF_ENABLE_ONEDNN_OPTS
        value: "0"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
      - key: OPENBLAS_NUM_THREADS
        value: "1"
      - key: NUMEXPR_NUM_THREADS
        value: "1"
      - key: VECLIB_MAXIMUM_THREADS
        value: "1"
    healthCheckPath: /health
    autoDeploy: true

