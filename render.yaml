services:
  - type: web
    name: deepfake-detector
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 10000
      - key: MEDIAPIPE_DISABLE_GPU
        value: 1
      - key: KMP_DUPLICATE_LIB_OK
        value: "True"
      - key: OMP_NUM_THREADS
        value: 2
      - key: MKL_NUM_THREADS
        value: 2
      - key: OPENBLAS_NUM_THREADS
        value: 2
      - key: NUMEXPR_NUM_THREADS
        value: 2
      - key: VECLIB_MAXIMUM_THREADS
        value: 2
      - key: FLASK_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: 1

